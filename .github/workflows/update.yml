---
name: "Updates"

on:
  schedule:
    # Run every Monday at 03:16 UTC
    - cron: '16 3 * * 1'
  workflow_dispatch:

defaults:
  run:
    shell: 'bash --noprofile --norc -Eeuo pipefail {0}'

env:
  python_version: "3.13"

jobs:
  update-dependencies:
    name: Update Python dependencies
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout the repository
        uses: actions/checkout@v5
        with:
          persist-credentials: 'false'
      - name: Bootstrap repository
        uses: ./.github/actions/bootstrap
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          python-version: ${{ env.python_version }}
      - name: Update dependencies
        run: task -o prefixed -v update
      - name: Create or update a pull request
        uses: peter-evans/create-pull-request@v7
        with:
          title: 'chore(deps): automated dependency updates'
          branch: automated-update/dependencies
          body: |
            # Automated dependency updates

            This PR was automatically generated by the [Update Workflow](https://github.com/${{ github.repository }}/actions/workflows/update.yml) and contains updates for Python dependencies.

            ## Changes
            - Updated uv tools to latest versions
            - Updated Python package dependencies via `uv lock --upgrade`
            - Synced virtual environment with upgraded dependencies
          commit-message: 'chore(deps): automated dependency updates'
          committer: 'Zenable Automation <automation@zenable.io>'
          author: 'Zenable Automation <automation@zenable.io>'
          labels: dependencies,automated
          delete-branch: true
          signoff: true
