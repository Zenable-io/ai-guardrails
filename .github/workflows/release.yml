---
name: "Release"

permissions:
  contents: write
  id-token: write

on:
  push:
    branches:
      - main
  workflow_dispatch:

defaults:
  run:
    shell: 'bash --noprofile --norc -Eeuo pipefail {0}'

env:
  python_version: "3.13"

jobs:
  release:
    name: Semantic Release
    runs-on: ubuntu-24.04
    concurrency: release
    # Only run on non-release commits to avoid loops
    if: "!contains(github.event.head_commit.message, 'chore(release):')"
    steps:
      - name: Checkout the repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.python_version }}

      - name: Run the Release
        id: release
        uses: python-semantic-release/python-semantic-release@v10
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          git_committer_name: "Zenable Automation"
          git_committer_email: "automation@zenable.io"

      - name: Summary
        if: steps.release.outputs.released == 'true'
        run: |
          echo "### 🚀 New Release Published" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** ${{ steps.release.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "**Tag:** ${{ steps.release.outputs.tag }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "The release has been created and tagged." >> $GITHUB_STEP_SUMMARY

      - name: No release
        if: steps.release.outputs.released == 'false'
        run: |
          echo "### ℹ️ No Release" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "No new version was released. This is normal if:" >> $GITHUB_STEP_SUMMARY
          echo "- No conventional commits since last release" >> $GITHUB_STEP_SUMMARY
          echo "- Only chore/docs commits (which don't trigger releases)" >> $GITHUB_STEP_SUMMARY
