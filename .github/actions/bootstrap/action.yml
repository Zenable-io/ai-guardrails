---
name: 'Bootstrap the repository'
description: 'Sets up uv, Task, and initializes the repository'
inputs:
  token:
    description: 'A Github token'
    required: true
  python-version:
    description: 'Python version to use'
    required: false
    default: '3.13'
  working-directory:
    description: 'The working directory'
    required: false
    default: '.'
runs:
  using: 'composite'
  steps:
    - name: Create run_script for running scripts downstream
      shell: 'bash --noprofile --norc -Eeuo pipefail {0}'
      working-directory: ${{ inputs.working-directory }}
      run: |
        run_script="uv run --frozen"
        echo "run_script=${run_script}" | tee -a "${GITHUB_ENV}"

    - name: Setup uv
      uses: astral-sh/setup-uv@v7
      with:
        enable-cache: true
        cache-dependency-glob: "**/uv.lock"
        python-version: ${{ inputs.python-version }}

    - name: Cache uv downloads
      uses: actions/cache@v5
      with:
        path: ~/.cache/uv
        key: uv-downloads-${{ runner.os }}-${{ hashFiles(format('{0}/uv.lock', inputs.working-directory)) }}
        restore-keys: |
          uv-downloads-${{ runner.os }}-

    - name: Install Task
      uses: go-task/setup-task@v1
      with:
        # Passing a repo token reduces the likelihood of API rate limit exceeded
        repo-token: ${{ inputs.token }}

    # NOTE: the hook environment cache deliberately lives in the lint job rather than here. Every job that bootstraps shares one cache key, and only the lint
    # job actually populates ~/.cache/prek. Caching it here meant a non-linting job could win the race and save an empty directory under the key, permanently
    # starving the lint job of a warm cache.

    - name: Initialize the repository
      working-directory: ${{ inputs.working-directory }}
      shell: 'bash --noprofile --norc -Eeuo pipefail {0}'
      run: task -v init
