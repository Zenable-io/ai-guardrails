---
spec:
  inputs:
    stage:
      default: test
      description: Pipeline stage in which to run the check.
    image:
      default: alpine:3.20
      description: |
        Base container image. Must have or be able to install bash, curl,
        and git via apk or apt-get.
    version:
      default: latest
      description: |
        Zenable CLI version. Use 'latest' (default), 'bleeding-edge',
        or a specific calver string like '2026.04.07'.
    paths:
      default: ""
      description: |
        Space-separated file paths or glob patterns to check. When empty,
        the job checks all files changed on the current branch compared to
        the base_branch input (i.e. `zenable check --branch`).
    base_branch:
      default: main
      description: Base branch for --branch comparison when paths is empty.
    format:
      default: text
      description: |
        Output format(s) for `zenable check`. Examples: 'text',
        'sarif=zenable.sarif', 'text,sarif=zenable.sarif,json=zenable.json'.
    audience:
      default: https://zenable.app
      description: |
        Audience claim for the OIDC ID token requested from GitLab.
        `zenable login` reads ZENABLE_OIDC_TOKEN to authenticate.
    extra_args:
      default: ""
      description: Additional flags forwarded to `zenable check`.
---
zenable-check:
  stage: $[[ inputs.stage ]]
  image: $[[ inputs.image ]]
  id_tokens:
    ZENABLE_OIDC_TOKEN:
      aud: $[[ inputs.audience ]]
  variables:
    ZENABLE_VERSION: $[[ inputs.version ]]
    ZENABLE_PATHS: $[[ inputs.paths ]]
    ZENABLE_BASE_BRANCH: $[[ inputs.base_branch ]]
    ZENABLE_FORMAT: $[[ inputs.format ]]
    ZENABLE_EXTRA_ARGS: $[[ inputs.extra_args ]]
  script:
    - |
      if command -v apk >/dev/null 2>&1; then
        apk add --no-cache curl bash git >/dev/null
      elif command -v apt-get >/dev/null 2>&1; then
        apt-get update -qq && apt-get install -y -qq curl bash git >/dev/null
      else
        echo "Unsupported base image: need apk or apt-get to install curl/bash/git" >&2
        exit 1
      fi
    - |
      curl -fsSL https://cli.zenable.app/install.sh -o /tmp/zenable-install.sh
      INSTALL_FLAGS="--no-modify-path"
      case "$ZENABLE_VERSION" in
        latest|"") ;;
        bleeding-edge) INSTALL_FLAGS="$INSTALL_FLAGS --bleeding-edge" ;;
        *) INSTALL_FLAGS="$INSTALL_FLAGS --version $ZENABLE_VERSION" ;;
      esac
      # The installer auto-runs `zenable install -y` (IDE integrations) when
      # CI=true. That step is unwanted in pipelines and may block; cap it with
      # `timeout` and verify the binary placement directly.
      timeout 90s bash /tmp/zenable-install.sh $INSTALL_FLAGS || true
      test -x "$HOME/.zenable/bin/zenable"
      export PATH="$HOME/.zenable/bin:$PATH"
      zenable version
    - zenable login
    - |
      if [ -n "$ZENABLE_PATHS" ]; then
        # shellcheck disable=SC2086
        zenable check --format "$ZENABLE_FORMAT" $ZENABLE_EXTRA_ARGS $ZENABLE_PATHS
      else
        # shellcheck disable=SC2086
        zenable check --branch --base-branch "$ZENABLE_BASE_BRANCH" \
          --format "$ZENABLE_FORMAT" $ZENABLE_EXTRA_ARGS
      fi
  artifacts:
    when: always
    paths:
      - "*.sarif"
      - "*.json"
    reports:
      sast:
        - "*.sarif"
